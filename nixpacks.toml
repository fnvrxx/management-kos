[phases.setup]
nixPkgs = [
    "php82",
    "php82Extensions.pdo",
    "php82Extensions.pdo_pgsql",
    "php82Extensions.mbstring",
    "php82Extensions.tokenizer",
    "php82Extensions.xml",
    "php82Extensions.ctype",
    "php82Extensions.bcmath",
    "php82Extensions.intl",
    "php82Extensions.zip",
    "php82Extensions.curl",
    "composer"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-intl --ignore-platform-req=ext-zip"]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=AdminSeeder --force && php artisan serve --host=0.0.0.0 --port=$PORT"